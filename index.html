<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>יין בעיר — הזמנות</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #b5965a;
    --gold-light: #d4b07a;
    --gold-pale: rgba(181,150,90,0.1);
    --dark: #1e1e1e;
    --dark2: #252525;
    --dark-card: #2d2d2d;
    --border: rgba(181,150,90,0.2);
    --border-strong: rgba(181,150,90,0.45);
    --text: #e8dfc8;
    --text-muted: #8a8070;
    --text-dim: #4a4538;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Heebo', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
  }
  .page { max-width: 480px; margin: 0 auto; padding: 0 0 120px; }

  /* HEADER */
  .header {
    background: #1a1a1a;
    border-bottom: 0.5px solid var(--border);
    padding: 20px 16px 16px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { height: 80px; object-fit: contain; }
  .tagline { font-size: 11px; color: var(--gold); letter-spacing: 0.12em; margin-top: 6px; font-weight: 300; }

  /* SECTION LABEL */
  .sec-label {
    font-size: 10px;
    font-weight: 500;
    color: var(--gold);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 16px 16px 8px;
  }

  /* FEATURED STRIP */
  .featured-strip {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 0 16px 8px;
    scrollbar-width: none;
  }
  .featured-strip::-webkit-scrollbar { display: none; }
  .feat-card {
    flex-shrink: 0;
    width: 86px;
    background: var(--dark-card);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 10px 8px;
    text-align: center;
    transition: border-color 0.2s;
  }
  .feat-card.in-cart { border-color: var(--gold); background: rgba(181,150,90,0.08); }
  .feat-icon { font-size: 20px; margin-bottom: 4px; }
  .feat-name { font-size: 11px; font-weight: 500; color: var(--text); line-height: 1.3; margin-bottom: 2px; }
  .feat-price { font-size: 11px; color: var(--gold); margin-bottom: 6px; }
  .feat-qty { display: flex; align-items: center; justify-content: center; gap: 6px; }
  .feat-btn {
    width: 22px; height: 22px; border-radius: 50%;
    border: 0.5px solid var(--border-strong);
    background: transparent; cursor: pointer;
    font-size: 15px; color: var(--gold);
    display: flex; align-items: center; justify-content: center;
    line-height: 1; transition: background 0.15s;
  }
  .feat-btn:hover { background: var(--gold-pale); }
  .feat-num { font-size: 12px; font-weight: 500; min-width: 14px; text-align: center; color: var(--text); }

  /* DIVIDER */
  .divider { height: 0.5px; background: var(--border); margin: 8px 16px; }

  /* CATEGORY TABS */
  .cats {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 0 16px 2px;
    scrollbar-width: none;
  }
  .cats::-webkit-scrollbar { display: none; }
  .cat-btn {
    flex-shrink: 0;
    padding: 5px 14px;
    border-radius: 99px;
    border: 0.5px solid var(--border-strong);
    background: transparent;
    font-size: 12px;
    font-family: 'Heebo', sans-serif;
    cursor: pointer;
    color: #c8b98a;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .cat-btn:hover { border-color: var(--gold); color: var(--gold); }
  .cat-btn.active { background: var(--gold); color: #1a1a1a; border-color: var(--gold); font-weight: 500; }
  .cat-btn.sp-sale { border-color: rgba(192,57,43,0.6); color: #e07060; }
  .cat-btn.sp-sale.active { background: #c0392b; color: #fff; border-color: #c0392b; }
  .cat-btn.sp-new { border-color: rgba(29,158,117,0.6); color: #4dbf96; }
  .cat-btn.sp-new.active { background: #1D9E75; color: #fff; border-color: #1D9E75; }
  .cat-btn.sp-owner { border-color: var(--border-strong); color: var(--gold-light); }
  .cat-btn.sp-owner.active { background: var(--gold); color: #1a1a1a; }

  /* OWNER NOTE */
  .owner-note {
    margin: 8px 16px;
    padding: 10px 14px;
    background: rgba(181,150,90,0.07);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    font-size: 12px;
    color: var(--gold-light);
    line-height: 1.6;
  }

  /* PRODUCTS */
  .products { padding: 8px 16px 0; }
  .prod-card {
    background: var(--dark-card);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .prod-card.sale-c { border-color: rgba(192,57,43,0.4); }
  .prod-card.new-c  { border-color: rgba(29,158,117,0.4); }
  .prod-card.own-c  { border-color: rgba(181,150,90,0.4); }
  .prod-icon {
    width: 44px; height: 44px;
    border-radius: 10px;
    background: #3a3a3a;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .prod-info { flex: 1; min-width: 0; }
  .prod-header { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
  .prod-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .prod-desc { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; line-height: 1.4; }
  .price-row { display: flex; align-items: center; gap: 7px; }
  .prod-price { font-size: 13px; font-weight: 500; color: var(--gold); }
  .price-old { font-size: 11px; color: var(--text-dim); text-decoration: line-through; }
  .badge { font-size: 10px; font-weight: 500; padding: 2px 6px; border-radius: 99px; flex-shrink: 0; }
  .b-sale  { background: rgba(192,57,43,0.18); color: #e07060; }
  .b-new   { background: rgba(29,158,117,0.18); color: #4dbf96; }
  .b-owner { background: rgba(181,150,90,0.18); color: var(--gold); }
  .qty-ctrl { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
  .qty-btn {
    width: 28px; height: 28px; border-radius: 50%;
    border: 0.5px solid var(--border-strong);
    background: transparent; cursor: pointer;
    font-size: 16px; color: var(--gold);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .qty-btn:hover { background: var(--gold-pale); }
  .qty-num { font-size: 14px; font-weight: 500; min-width: 18px; text-align: center; color: var(--text); }

  /* EMPTY */
  .empty-msg { text-align: center; padding: 16px; font-size: 12px; color: var(--text-dim); }

  /* CART BAR — sticky bottom */
  .cart-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    max-width: 480px;
    margin: 0 auto;
    background: #1a1710;
    border-top: 0.5px solid var(--border-strong);
    padding: 12px 16px 16px;
    z-index: 200;
  }
  .cart-summary {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .cart-label { font-size: 12px; color: var(--gold); font-weight: 500; letter-spacing: 0.05em; }
  .cart-total-val { font-size: 16px; font-weight: 500; color: var(--text); }
  .cart-items-list { margin-bottom: 10px; }
  .cart-item {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 3px 0;
    color: #c8b98a;
    border-bottom: 0.5px solid var(--border);
  }
  .wa-btn {
    width: 100%;
    padding: 13px;
    border-radius: 10px;
    border: none;
    background: var(--gold);
    color: #1a1a1a;
    font-size: 15px;
    font-weight: 500;
    font-family: 'Heebo', sans-serif;
    cursor: pointer;
    transition: opacity 0.15s;
    letter-spacing: 0.02em;
  }
  .wa-btn:hover { opacity: 0.88; }

  /* SUCCESS */
  .success-wrap {
    padding: 40px 16px;
    text-align: center;
  }
  .success-icon { font-size: 48px; margin-bottom: 16px; }
  .success-title { font-size: 20px; font-weight: 500; color: var(--gold); margin-bottom: 8px; }
  .success-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }
  .back-btn {
    padding: 11px 28px;
    border-radius: 8px;
    border: 0.5px solid var(--border-strong);
    background: transparent;
    color: var(--gold);
    font-size: 14px;
    font-family: 'Heebo', sans-serif;
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <img class="logo" src="logo.jpg" alt="יין בעיר" onerror="this.style.display='none'">
    <div class="tagline">הקנייה הכי טובה בעיר</div>
  </div>

  <div id="shop-content">
    <div class="sec-label">מוצרים מבוקשים</div>
    <div class="featured-strip" id="featured-strip"></div>

    <div class="divider"></div>

    <div class="sec-label" style="padding-bottom:6px">תפריט</div>
    <div class="cats" id="cats"></div>
    <div id="owner-note" style="display:none"></div>
    <div class="products" id="products"></div>
    <div class="empty-msg" id="empty-msg">בחר מוצרים להוספה לסל</div>
  </div>

  <div id="success-content" style="display:none">
    <div class="success-wrap">
      <div class="success-icon">✓</div>
      <div class="success-title">ההזמנה נשלחה!</div>
      <div class="success-sub">נחזור אליך בהקדם לאישור ותשלום</div>
      <button class="back-btn" onclick="resetShop()">← חזור לתפריט</button>
    </div>
  </div>

</div>

<div class="cart-bar" id="cart-bar" style="display:none">
  <div class="cart-summary">
    <span class="cart-label">הסל שלך</span>
    <span class="cart-total-val" id="cart-total-val">₪0</span>
  </div>
  <div class="cart-items-list" id="cart-items-list"></div>
  <button class="wa-btn" onclick="sendWhatsApp()">שלח הזמנה בוואטסאפ</button>
</div>

<script>
// ====== הגדרות ======
const WA_NUMBER = '972500000000'; // שנה למספר הטלפון שלך

const FEATURED = [
  { id:'f1', icon:'🧊', name:'קרח', price:12 },
  { id:'f2', icon:'⚡', name:'blu אנרגי', price:9 },
  { id:'f3', icon:'🥜', name:'חטיפים', price:15 },
];

const CATS = [
  { id:'all',       label:'הכל',            cls:'' },
  { id:'sale',      label:'מבצעים',         cls:'sp-sale' },
  { id:'new',       label:'חדשים על המדף',  cls:'sp-new' },
  { id:'owner',     label:'המלצת בעל הבית', cls:'sp-owner' },
  { id:'red',       label:'יין אדום',        cls:'' },
  { id:'white',     label:'יין לבן',         cls:'' },
  { id:'sparkling', label:'מבעבע',           cls:'' },
  { id:'spirits',   label:'חריפים',          cls:'' },
  { id:'beer',      label:'בירה',            cls:'' },
];

const PRODUCTS = [
  { id:1,  cat:'red',       tags:['sale'],  icon:'🍷', name:'רמת הגולן — קברנה',  desc:'קברנה סוביניון 2022', price:69,  oldPrice:89 },
  { id:2,  cat:'red',       tags:['owner'], icon:'🍷', name:'יקב דלתון — מרלו',   desc:'האהוב עלי לבשר השנה.', price:74 },
  { id:3,  cat:'white',     tags:['new'],   icon:'🥂', name:'ברקן — שרדונה',       desc:'שרדונה קלאסיק 2023',  price:69 },
  { id:4,  cat:'white',     tags:[],        icon:'🥂', name:'גן עדן — סוביניון',   desc:'יין לבן יבש 2023',    price:65 },
  { id:5,  cat:'sparkling', tags:['sale'],  icon:'🍾', name:'פרשנט — קאווה',       desc:'ברוט נטורל, ספרד',    price:59, oldPrice:79 },
  { id:6,  cat:'sparkling', tags:['new'],   icon:'🍾', name:'מוסטו — פרוסקו',      desc:'DOC Extra Dry',        price:92 },
  { id:7,  cat:'spirits',   tags:['owner'], icon:'🥃', name:'גלנליבט 12',           desc:'הוויסקי שאני פותח לאורחים.', price:210 },
  { id:8,  cat:'spirits',   tags:['sale'],  icon:'🥃', name:'אבסולוט וודקה',        desc:'700 מ"ל',              price:75, oldPrice:95 },
  { id:9,  cat:'beer',      tags:['new'],   icon:'🫧', name:'דובל בלגי',            desc:'6 בקבוקים 330 מ"ל',   price:54 },
  { id:10, cat:'beer',      tags:[],        icon:'🫧', name:'גינס — פחיות',         desc:'4 פחיות 440 מ"ל',     price:42 },
];
// ====== סוף הגדרות ======

const qty={}, fqty={};
PRODUCTS.forEach(p=>qty[p.id]=0);
FEATURED.forEach(f=>fqty[f.id]=0);
let activeCat='all';

function renderFeatured(){
  document.getElementById('featured-strip').innerHTML=FEATURED.map(f=>`
    <div class="feat-card${fqty[f.id]>0?' in-cart':''}" id="fc${f.id}">
      <div class="feat-icon">${f.icon}</div>
      <div class="feat-name">${f.name}</div>
      <div class="feat-price">₪${f.price}</div>
      <div class="feat-qty">
        <button class="feat-btn" onclick="fc('${f.id}',-1)">−</button>
        <span class="feat-num" id="fq${f.id}">${fqty[f.id]}</span>
        <button class="feat-btn" onclick="fc('${f.id}',1)">+</button>
      </div>
    </div>`).join('');
}
function fc(id,d){
  fqty[id]=Math.max(0,fqty[id]+d);
  const n=document.getElementById('fq'+id); if(n) n.textContent=fqty[id];
  const c=document.getElementById('fc'+id); if(c) c.className='feat-card'+(fqty[id]>0?' in-cart':'');
  renderCart();
}
function renderCats(){
  document.getElementById('cats').innerHTML=CATS.map(c=>
    `<button class="cat-btn ${c.cls}${activeCat===c.id?' active':''}" onclick="setCat('${c.id}')">${c.label}</button>`
  ).join('');
}
function setCat(id){ activeCat=id; renderCats(); renderProducts(); }
function badge(p){
  if(p.tags.includes('sale'))  return '<span class="badge b-sale">מבצע</span>';
  if(p.tags.includes('new'))   return '<span class="badge b-new">חדש</span>';
  if(p.tags.includes('owner')) return '<span class="badge b-owner">המלצה</span>';
  return '';
}
function cardCls(p){
  if(p.tags.includes('sale'))  return 'prod-card sale-c';
  if(p.tags.includes('new'))   return 'prod-card new-c';
  if(p.tags.includes('owner')) return 'prod-card own-c';
  return 'prod-card';
}
function renderProducts(){
  let vis;
  if(activeCat==='all')        vis=PRODUCTS;
  else if(activeCat==='sale')  vis=PRODUCTS.filter(p=>p.tags.includes('sale'));
  else if(activeCat==='new')   vis=PRODUCTS.filter(p=>p.tags.includes('new'));
  else if(activeCat==='owner') vis=PRODUCTS.filter(p=>p.tags.includes('owner'));
  else                         vis=PRODUCTS.filter(p=>p.cat===activeCat);
  const note=document.getElementById('owner-note');
  if(activeCat==='owner'){
    note.style.display='block';
    note.textContent='ההמלצות האישיות שלי — מוצרים שאני עומד מאחוריהם בשתי ידיים.';
  } else { note.style.display='none'; }
  document.getElementById('products').innerHTML=vis.map(p=>`
    <div class="${cardCls(p)}">
      <div class="prod-icon">${p.icon}</div>
      <div class="prod-info">
        <div class="prod-header">
          <span class="prod-name">${p.name}</span>${badge(p)}
        </div>
        <div class="prod-desc">${p.desc}</div>
        <div class="price-row">
          <span class="prod-price">₪${p.price}</span>
          ${p.oldPrice?`<span class="price-old">₪${p.oldPrice}</span>`:''}
        </div>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="ch(${p.id},-1)">−</button>
        <span class="qty-num" id="q${p.id}">${qty[p.id]}</span>
        <button class="qty-btn" onclick="ch(${p.id},1)">+</button>
      </div>
    </div>`).join('');
}
function ch(id,d){
  qty[id]=Math.max(0,qty[id]+d);
  const el=document.getElementById('q'+id); if(el) el.textContent=qty[id];
  renderCart();
}
function allItems(){
  const items=[];
  FEATURED.forEach(f=>{ if(fqty[f.id]>0) items.push({name:f.name, price:f.price, q:fqty[f.id]}); });
  PRODUCTS.forEach(p=>{ if(qty[p.id]>0)  items.push({name:p.name, price:p.price, q:qty[p.id]}); });
  return items;
}
function renderCart(){
  const items=allItems();
  const total=items.reduce((s,i)=>s+i.price*i.q,0);
  const bar=document.getElementById('cart-bar');
  const em=document.getElementById('empty-msg');
  if(!items.length){ bar.style.display='none'; em.style.display='block'; return; }
  bar.style.display='block'; em.style.display='none';
  document.getElementById('cart-items-list').innerHTML=items.map(i=>
    `<div class="cart-item"><span>${i.name} ×${i.q}</span><span>₪${i.price*i.q}</span></div>`
  ).join('');
  document.getElementById('cart-total-val').textContent='₪'+total;
}
function sendWhatsApp(){
  const items=allItems();
  const total=items.reduce((s,i)=>s+i.price*i.q,0);
  const lines=items.map(i=>`• ${i.name} ×${i.q} — ₪${i.price*i.q}`).join('\n');
  const msg=`הזמנה חדשה מדף ההזמנות:\n\n${lines}\n\nסה"כ: ₪${total}`;
  const url=`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`;
  window.open(url,'_blank');
  document.getElementById('shop-content').style.display='none';
  document.getElementById('cart-bar').style.display='none';
  document.getElementById('success-content').style.display='block';
}
function resetShop(){
  PRODUCTS.forEach(p=>qty[p.id]=0);
  FEATURED.forEach(f=>fqty[f.id]=0);
  activeCat='all';
  document.getElementById('success-content').style.display='none';
  document.getElementById('shop-content').style.display='block';
  renderFeatured(); renderCats(); renderProducts(); renderCart();
}
renderFeatured(); renderCats(); renderProducts();
</script>
</body>
</html>
