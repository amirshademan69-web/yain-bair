<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>יין בעיר — לוח הזמנות</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #b5965a;
    --gold-light: #d4b07a;
    --gold-pale: rgba(181,150,90,0.1);
    --dark: #1e1e1e;
    --dark2: #252525;
    --dark-card: #2d2d2d;
    --border: rgba(181,150,90,0.2);
    --border-strong: rgba(181,150,90,0.45);
    --text: #e8dfc8;
    --text-muted: #8a8070;
    --text-dim: #4a4538;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Heebo', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
  }
  .page { max-width: 520px; margin: 0 auto; padding-bottom: 40px; }

  /* HEADER */
  .header {
    background: #1a1a1a;
    border-bottom: 0.5px solid var(--border);
    padding: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo { height: 44px; object-fit: contain; }
  .header-title { font-size: 14px; font-weight: 500; color: var(--gold); }
  .header-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .header-time { font-size: 11px; color: var(--text-muted); }

  /* STATS */
  .stats-row {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    background: var(--dark2);
    border-bottom: 0.5px solid var(--border);
  }
  .stat { flex: 1; text-align: center; }
  .stat-num { font-size: 22px; font-weight: 500; color: var(--gold); }
  .stat-num.orange { color: #EF9F27; }
  .stat-num.green  { color: #1D9E75; }
  .stat-num.blue   { color: #378ADD; }
  .stat-num.red    { color: #c0392b; }
  .stat-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; letter-spacing: 0.05em; }

  /* FILTERS */
  .filter-row {
    display: flex;
    gap: 6px;
    padding: 10px 16px;
    border-bottom: 0.5px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filter-row::-webkit-scrollbar { display: none; }
  .filt {
    flex-shrink: 0;
    padding: 5px 14px;
    border-radius: 99px;
    border: 0.5px solid var(--border-strong);
    background: transparent;
    font-size: 12px;
    font-family: 'Heebo', sans-serif;
    cursor: pointer;
    color: #c8b98a;
    transition: all 0.15s;
  }
  .filt.active { background: var(--gold); color: #1a1a1a; border-color: var(--gold); font-weight: 500; }

  /* ORDERS */
  .orders { padding: 10px 16px; display: flex; flex-direction: column; gap: 10px; }

  .order-card {
    background: var(--dark-card);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 14px;
  }
  .order-card.pending  { border-right: 3px solid #EF9F27; }
  .order-card.approved { border-right: 3px solid #1D9E75; }
  .order-card.rejected { border-right: 3px solid #c0392b; }
  .order-card.ready    { border-right: 3px solid #378ADD; }

  .order-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }
  .order-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .order-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  .status-badge { font-size: 10px; font-weight: 500; padding: 3px 10px; border-radius: 99px; white-space: nowrap; }
  .s-pending  { background: rgba(239,159,39,0.15); color: #EF9F27; }
  .s-approved { background: rgba(29,158,117,0.15); color: #1D9E75; }
  .s-rejected { background: rgba(192,57,43,0.15);  color: #e07060; }
  .s-ready    { background: rgba(55,138,221,0.15);  color: #378ADD; }

  .order-items {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.7;
    margin-bottom: 10px;
    padding-bottom: 10px;
    border-bottom: 0.5px solid var(--border);
  }
  .order-item-row { display: flex; justify-content: space-between; }

  .order-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .order-total { font-size: 15px; font-weight: 500; color: var(--gold); }
  .order-note { font-size: 11px; color: var(--text-muted); font-style: italic; }

  /* ACTION BUTTONS */
  .action-row { display: flex; gap: 6px; }
  .act-btn {
    flex: 1;
    padding: 8px 6px;
    border-radius: 8px;
    border: 0.5px solid var(--border-strong);
    background: transparent;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Heebo', sans-serif;
    transition: all 0.15s;
    color: var(--text-muted);
    text-align: center;
  }
  .act-btn.approve { border-color: rgba(29,158,117,0.5); color: #1D9E75; }
  .act-btn.approve:hover { background: rgba(29,158,117,0.1); }
  .act-btn.reject  { border-color: rgba(192,57,43,0.4); color: #e07060; }
  .act-btn.reject:hover  { background: rgba(192,57,43,0.1); }
  .act-btn.ready   { border-color: rgba(55,138,221,0.4); color: #378ADD; }
  .act-btn.ready:hover   { background: rgba(55,138,221,0.1); }
  .act-btn.restore { border-color: rgba(239,159,39,0.4); color: #EF9F27; }
  .act-btn.restore:hover { background: rgba(239,159,39,0.08); }
  .act-btn.contact { border-color: var(--border-strong); color: var(--gold-light); }
  .act-btn.contact:hover { background: var(--gold-pale); }

  /* CONTACT POPUP */
  .contact-wrap { position: relative; flex: 1; }
  .contact-popup {
    position: absolute;
    top: calc(100% + 6px);
    left: 0; right: 0;
    background: #1a1a1a;
    border: 0.5px solid var(--border-strong);
    border-radius: 10px;
    padding: 4px;
    z-index: 200;
    min-width: 190px;
  }
  .contact-popup.hidden { display: none; }
  .cp-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: 7px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .cp-item:hover { background: var(--gold-pale); }
  .cp-icon {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }
  .cp-icon.wa  { background: rgba(37,211,102,0.15); }
  .cp-icon.tel { background: rgba(55,138,221,0.15); }
  .cp-icon.sms { background: rgba(181,150,90,0.15); }
  .cp-label { font-size: 12px; color: var(--text); }
  .cp-sub   { font-size: 10px; color: var(--text-muted); }
  .cp-divider { height: 0.5px; background: var(--border); margin: 2px 0; }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    padding: 10px 16px;
    border-bottom: 0.5px solid var(--border);
  }
  .tab-btn {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-size: 13px;
    font-family: 'Heebo', sans-serif;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); font-weight: 500; }

  /* KANBAN BOARD */
  .kanban-board {
    display: flex;
    gap: 12px;
    padding: 12px 16px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .kanban-board::-webkit-scrollbar { display: none; }
  .kanban-col {
    flex: 0 0 180px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .col-header {
    font-size: 12px;
    font-weight: 500;
    color: var(--gold);
    padding: 8px 10px;
    background: var(--dark2);
    border-radius: 8px;
    text-align: center;
  }
  .col-count { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

  .kanban-order-card {
    background: var(--dark-card);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .kanban-order-card:hover { border-color: var(--gold); }
  .kanban-order-card.delivered {
    opacity: 0.7;
    background: rgba(29,158,117,0.08);
    border-color: rgba(29,158,117,0.3);
  }
  .history-card {
    opacity: 0.65;
    background: var(--dark2);
    border-color: var(--text-dim);
  }

  /* EMPTY */
  .empty-msg {
    text-align: center;
    padding: 40px 16px;
    font-size: 13px;
    color: var(--text-dim);
  }

  /* HISTORY VIEW */
  .history-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 8px;
    padding: 12px 16px;
  }

  /* NEW ORDER DEMO BTN */
  .demo-btn {
    display: block;
    margin: 0 16px;
    width: calc(100% - 32px);
    padding: 11px;
    border-radius: 8px;
    border: 0.5px dashed var(--border-strong);
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    cursor: pointer;
    font-family: 'Heebo', sans-serif;
    transition: all 0.15s;
  }
  .demo-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* NOTIFICATION TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a1a;
    border: 0.5px solid var(--border-strong);
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text);
    z-index: 999;
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <img class="header-logo" src="logo.jpg" alt="יין בעיר" onerror="this.style.display='none'">
    <div>
      <div class="header-title">לוח הזמנות</div>
      <div class="header-sub">ממשק ניהול פנימי</div>
    </div>
    <div class="header-time" id="clock"></div>
  </div>

  <div class="stats-row">
    <div class="stat">
      <div class="stat-num" id="cnt-all">0</div>
      <div class="stat-label">סה"כ</div>
    </div>
    <div class="stat">
      <div class="stat-num orange" id="cnt-pending">0</div>
      <div class="stat-label">ממתינות</div>
    </div>
    <div class="stat">
      <div class="stat-num green" id="cnt-approved">0</div>
      <div class="stat-label">אושרו</div>
    </div>
    <div class="stat">
      <div class="stat-num blue" id="cnt-ready">0</div>
      <div class="stat-label">מוכנות</div>
    </div>
    <div class="stat">
      <div class="stat-num red" id="cnt-rejected">0</div>
      <div class="stat-label">נדחו</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="toggleView('kanban')">לוח זמנות</button>
    <button class="tab-btn" onclick="toggleView('history')">היסטוריה</button>
  </div>

  <div id="kanban-view">
    <div class="kanban-board" id="kanban-board"></div>
  </div>

  <div id="history-view" style="display:none">
    <div class="history-grid" id="history-grid"></div>
  </div>

  <button class="demo-btn" onclick="addDemoOrder()">+ הוסף הזמנת דמו (לצורך הדגמה)</button>

</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// Kanban-style Order Management
// ============================================================

function loadOrders() {
  const raw = localStorage.getItem('yb_orders');
  return raw ? JSON.parse(raw) : getDemoOrders();
}

function saveOrders() {
  localStorage.setItem('yb_orders', JSON.stringify(orders));
}

function getDemoOrders() {
  return [
    { id:1, name:'דוד כהן',   phone:'0521234567', time:'14:05', items:[{name:'יין אדום רמת הגולן',qty:2,price:89},{name:'קרח',qty:1,price:12}], total:190, status:'pending',  note:'' },
    { id:2, name:'מיכל לוי',  phone:'0537654321', time:'13:48', items:[{name:'גלנליבט 12',qty:1,price:210},{name:'blu אנרגי',qty:3,price:9}], total:237, status:'approved', note:'' },
    { id:3, name:'רון אברהם', phone:'0509876543', time:'13:20', items:[{name:'פרשנט קאווה',qty:2,price:59},{name:'חטיפים',qty:2,price:15}], total:148, status:'ready',    note:'בוא לאסוף ב-15:00' },
  ];
}

let orders = loadOrders();
let nextId = orders.length ? Math.max(...orders.map(o=>o.id)) + 1 : 1;
let currentView = 'kanban';

const SL = { pending:'ממתינה', approved:'אושרה', ready:'מוכנה', delivered:'נמסרה', rejected:'נדחתה' };
const SC = { pending:'s-pending', approved:'s-approved', ready:'s-ready', delivered:'s-ready', rejected:'s-rejected' };

// TABS
function toggleView(view) {
  currentView = view;
  document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
    btn.classList.toggle('active', (idx === 0 && view === 'kanban') || (idx === 1 && view === 'history'));
  });
  document.getElementById('kanban-view').style.display = view === 'kanban' ? 'block' : 'none';
  document.getElementById('history-view').style.display = view === 'history' ? 'block' : 'none';

  if (view === 'kanban') renderKanban();
  else renderHistory();
}

// KANBAN RENDER
function renderKanban() {
  const activeOrders = orders.filter(o => o.status !== 'delivered' && o.status !== 'rejected');
  const statuses = ['pending', 'approved', 'ready', 'delivered', 'rejected'];
  const statusLabels = { pending: 'ממתינות', approved: 'אושרו', ready: 'מוכנות', delivered: 'מסורות', rejected: 'נדחו' };

  const board = document.getElementById('kanban-board');
  board.innerHTML = statuses.map(status => {
    const cards = activeOrders.filter(o => o.status === status);
    return `
      <div class="kanban-col">
        <div class="col-header">
          ${statusLabels[status]}
          <div class="col-count">(${cards.length})</div>
        </div>
        <div id="col-${status}" class="col-cards">
          ${cards.map(o => renderKanbanCard(o)).join('')}
        </div>
      </div>`;
  }).join('');

  updateStats(activeOrders);
}

function renderKanbanCard(o) {
  const itemsStr = o.items.map(i => `${i.name} ×${i.qty}`).join(', ');
  let actions = '';

  if (o.status === 'pending') {
    actions = `
      <button class="act-btn approve" onclick="setStatus(${o.id},'approved')">אשר</button>
      <button class="act-btn reject" onclick="setStatus(${o.id},'rejected')">דחה</button>`;
  } else if (o.status === 'approved') {
    actions = `<button class="act-btn ready" onclick="setStatus(${o.id},'ready')">בהכנה</button>`;
  } else if (o.status === 'ready') {
    actions = `<button class="act-btn ready" onclick="setStatus(${o.id},'delivered')">מסור ✓</button>`;
  }

  return `
    <div class="kanban-order-card ${o.status === 'delivered' ? 'delivered' : ''}">
      <div style="font-weight:500; margin-bottom:4px;">${o.name}</div>
      <div style="font-size:10px; color:var(--text-muted); margin-bottom:6px;">${o.time} • ${o.phone}</div>
      <div style="font-size:10px; color:var(--text-muted); margin-bottom:6px; line-height:1.4;">${itemsStr}</div>
      <div style="color:var(--gold); font-weight:500; margin-bottom:8px;">₪${o.total}</div>
      <div style="display:flex; gap:4px; font-size:11px;">
        ${actions}
        <div class="contact-wrap" style="flex:1;">
          <button class="act-btn contact" style="width:100%;" onclick="toggleContact(${o.id}, event)">📞▾</button>
          <div class="contact-popup hidden" id="cp${o.id}" style="min-width:160px;">
            <div class="cp-item" onclick="doWA('${o.phone}','${o.name}','${SL[o.status]}')">
              <div class="cp-icon wa">💬</div>
              <div><div class="cp-label">וואטסאפ</div></div>
            </div>
            <div class="cp-divider"></div>
            <div class="cp-item" onclick="doTel('${o.phone}')">
              <div class="cp-icon tel">📞</div>
              <div><div class="cp-label">${o.phone}</div></div>
            </div>
          </div>
        </div>
      </div>
    </div>`;
}

// HISTORY RENDER
function renderHistory() {
  const historyOrders = orders.filter(o => o.status === 'delivered' || o.status === 'rejected');
  const grid = document.getElementById('history-grid');

  if (!historyOrders.length) {
    grid.innerHTML = '<div class="empty-msg" style="grid-column:1/-1;">אין הזמנות בהיסטוריה</div>';
    return;
  }

  grid.innerHTML = historyOrders.map(o => `
    <div class="kanban-order-card history-card">
      <div style="font-weight:500; margin-bottom:4px; font-size:11px;">${o.name}</div>
      <div style="font-size:9px; color:var(--text-muted); margin-bottom:4px;">${o.time}</div>
      <div style="font-size:9px; color:var(--text-dim); margin-bottom:4px;">₪${o.total}</div>
      <div style="font-size:8px; color:var(--text-muted); font-style:italic; padding:4px; background:rgba(0,0,0,0.3); border-radius:4px;">
        ${o.status === 'delivered' ? '✓ נמסרה' : '✗ נדחתה'}
      </div>
      <button class="act-btn restore" style="margin-top:6px;" onclick="setStatus(${o.id},'pending')">← חזור לממתינות</button>
    </div>`).join('');
}

function setStatus(id, status) {
  const o = orders.find(x => x.id === id);
  if (!o) return;
  o.status = status;
  saveOrders();
  if (currentView === 'kanban') renderKanban();
  else renderHistory();
  showToast(`${o.name} — ${SL[status]}`);
}

function updateStats(activeOrders) {
  document.getElementById('cnt-all').textContent = activeOrders.length;
  document.getElementById('cnt-pending').textContent = activeOrders.filter(o => o.status === 'pending').length;
  document.getElementById('cnt-approved').textContent = activeOrders.filter(o => o.status === 'approved').length;
  document.getElementById('cnt-ready').textContent = activeOrders.filter(o => o.status === 'ready').length;
  document.getElementById('cnt-rejected').textContent = orders.filter(o => o.status === 'rejected').length;
}

// CONTACT
function toggleContact(id, e) {
  e.stopPropagation();
  const popup = document.getElementById('cp' + id);
  closeAllPopups();
  if (popup) popup.classList.remove('hidden');
}
function closeAllPopups() {
  document.querySelectorAll('.contact-popup').forEach(p => p.classList.add('hidden'));
}
document.addEventListener('click', closeAllPopups);

function doWA(phone, name, status) {
  const msg = `שלום ${name}, ההזמנה שלך ביין בעיר — ${status}. תודה!`;
  const num = phone.replace(/^0/, '972');
  window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`, '_blank');
  closeAllPopups();
}
function doTel(phone) {
  window.location.href = `tel:${phone}`;
  closeAllPopups();
}

// TOAST
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// CLOCK
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
}
updateClock();
setInterval(updateClock, 30000);

// DEMO ORDERS
const DN = ['יוסי מזרחי','תמר שמיר','אלי גולן','נועה ברק','שי כץ','אורן פרץ'];
const DP = ['0521111111','0532222222','0543333333','0554444444','0565555555','0576666666'];
const DI = [
  [{name:'יין לבן ברקן',qty:2,price:69},{name:'חטיפים',qty:1,price:15}],
  [{name:'גינס פחיות',qty:3,price:42},{name:'קרח',qty:2,price:12}],
  [{name:'אבסולוט וודקה',qty:1,price:75},{name:'blu אנרגי',qty:4,price:9}],
  [{name:'קאווה פרשנט',qty:2,price:59}],
  [{name:'מרלו דלתון',qty:1,price:74},{name:'קרח',qty:1,price:12},{name:'חטיפים',qty:2,price:15}],
  [{name:'גלנליבט 12',qty:1,price:210},{name:'blu אנרגי',qty:2,price:9}],
];
let demoIdx = 0;

function addDemoOrder() {
  const i = demoIdx % DN.length;
  const now = new Date();
  const time = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  const items = DI[i];
  const total = items.reduce((s,x) => s + x.price * x.qty, 0);
  orders.unshift({ id: nextId++, name: DN[i], phone: DP[i], time, items, total, status:'pending', note:'' });
  demoIdx++;
  saveOrders();
  currentView = 'kanban';
  document.querySelectorAll('.tab-btn').forEach((b,idx) => b.classList.toggle('active', idx===0));
  renderKanban();
  showToast(`הזמנה חדשה מ-${DN[(demoIdx-1) % DN.length]}`);
}

// INIT
renderKanban();
</script>
</body>
</html>
